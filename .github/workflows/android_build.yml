name: Build NoticiasIRO APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Show versions
        run: |
          java -version
          echo "ANDROID_HOME=$ANDROID_HOME"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Clean project
        run: ./gradlew clean

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: List APKs
        run: find app/build/outputs -name "*.apk" -type f -exec ls -lh {} \;

      - name: Rename APKs
        run: |
          mkdir -p artifacts
          [ -f app/build/outputs/apk/debug/app-debug.apk ] && \
            cp app/build/outputs/apk/debug/app-debug.apk artifacts/NoticiasIRO-debug.apk
          [ -f app/build/outputs/apk/release/app-release-unsigned.apk ] && \
            cp app/build/outputs/apk/release/app-release-unsigned.apk artifacts/NoticiasIRO-release-unsigned.apk
          ls -lh artifacts/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NoticiasIRO-APKs
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 30
